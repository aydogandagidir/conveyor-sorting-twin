<svg viewBox="0 0 1180 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, Arial, sans-serif" role="img" aria-label="OpenLogiTwin web HMI — ANSI/ISA-101 high-performance operator console for the conveyor sorting cell">
  <!-- app canvas (High-Performance HMI: gray, equipment by outline, colour only for live data) -->
  <rect x="0" y="0" width="1180" height="560" rx="10" fill="#e6e6e8"/>
  <rect x="0.5" y="0.5" width="1179" height="559" rx="9.5" fill="none" stroke="#c2c2c6"/>

  <!-- status bar -->
  <rect x="1" y="1" width="1178" height="38" rx="9" fill="#dcdce0"/>
  <rect x="1" y="28" width="1178" height="11" fill="#dcdce0"/>
  <text x="20" y="25" font-size="15" fill="#1f4e79" font-weight="700">◆</text>
  <text x="40" y="25" font-size="14" fill="#2b2f34" font-weight="700">OpenLogiTwin</text>
  <text x="150" y="25" font-size="12.5" fill="#5a5f66">Line 01 · Sorting Cell</text>
  <text x="760" y="25" font-size="11" fill="#7c818a">SCAN</text><text x="800" y="25" font-size="12.5" fill="#2b2f34" font-weight="600">50 ms</text>
  <text x="880" y="25" font-size="11" fill="#7c818a">CLOCK</text><text x="928" y="25" font-size="12.5" fill="#2b2f34" font-weight="600">14:22:07</text>
  <text x="1024" y="25" font-size="11" fill="#7c818a">MODE</text>
  <rect x="1062" y="14" width="9" height="9" fill="#c6c6c6" stroke="#a8a8ac"/>
  <text x="1078" y="25" font-size="12.5" fill="#2b2f34" font-weight="700">REPLAY</text>

  <!-- ===================== mimic ===================== -->
  <text x="40" y="74" font-size="12.5" fill="#5a5f66" letter-spacing="0.5">CONV-001 · SORTING CELL</text>

  <!-- infeed funnel -->
  <path d="M150 150 h60 l-16 76 h-28 z" fill="#e6e6e8" stroke="#9a9aa0" stroke-width="1.3"/>
  <text x="180" y="142" font-size="10.5" fill="#7c818a" text-anchor="middle">INFEED</text>
  <path d="M250 110 h44 m-8 -5 l8 5 l-8 5" fill="none" stroke="#a8a8ac" stroke-width="1.3"/>

  <!-- drive motor M-001 (running: brighter than canvas + word) -->
  <circle cx="104" cy="256" r="24" fill="#fbfbfb" stroke="#9a9aa0" stroke-width="1.5"/>
  <text x="104" y="262" font-size="17" fill="#33373b" text-anchor="middle" font-weight="600">M</text>
  <text x="104" y="298" font-size="10.5" fill="#7c818a" text-anchor="middle">M-001</text>

  <!-- conveyor belt (outline; fill = canvas) + side rails -->
  <rect x="150" y="240" width="566" height="32" fill="#e6e6e8" stroke="#9a9aa0" stroke-width="1.5"/>
  <line x1="150" y1="246" x2="716" y2="246" stroke="#a8a8ac" stroke-width="0.7" opacity="0.6"/>
  <line x1="150" y1="266" x2="716" y2="266" stroke="#a8a8ac" stroke-width="0.7" opacity="0.6"/>

  <!-- photo-eyes (ISA instrument bubbles) -->
  <g>
    <line x1="288" y1="222" x2="288" y2="240" stroke="#a8a8ac" stroke-width="1"/>
    <circle cx="288" cy="212" r="9" fill="#e6e6e8" stroke="#9a9aa0" stroke-width="1.3"/>
    <text x="288" y="196" font-size="10" fill="#7c818a" text-anchor="middle">PE-001</text>
  </g>
  <g>
    <line x1="556" y1="222" x2="556" y2="240" stroke="#a8a8ac" stroke-width="1"/>
    <circle cx="556" cy="212" r="9" fill="#fbfbfb" stroke="#9a9aa0" stroke-width="1.3"/>
    <text x="556" y="196" font-size="10" fill="#7c818a" text-anchor="middle">PE-002</text>
  </g>

  <!-- diverter DV-001 (gate, diverting to A) -->
  <circle cx="624" cy="272" r="3" fill="#9a9aa0"/>
  <line x1="624" y1="272" x2="600" y2="234" stroke="#33373b" stroke-width="3.4"/>
  <text x="624" y="298" font-size="10.5" fill="#7c818a" text-anchor="middle">DV-001</text>

  <!-- chute A spur (up) + chute B spur (down) -->
  <path d="M624 240 L735 156" fill="none" stroke="#9a9aa0" stroke-width="1.3" stroke-dasharray="5 4"/>
  <path d="M716 272 L735 350" fill="none" stroke="#9a9aa0" stroke-width="1.3" stroke-dasharray="5 4"/>

  <!-- bin A -->
  <path d="M735 120 v54 h150 v-54" fill="#e6e6e8" stroke="#9a9aa0" stroke-width="1.3"/>
  <text x="739" y="112" font-size="11" fill="#5a5f66">CHUTE A</text>
  <text x="881" y="112" font-size="16" fill="#1f4e79" text-anchor="end" font-weight="700">12</text>
  <text x="743" y="156" font-size="8.5" fill="#7c818a">LEVEL</text>
  <rect x="743" y="160" width="134" height="9" fill="#e6e6e8" stroke="#a8a8ac" stroke-width="0.8"/>
  <rect x="744" y="161" width="100" height="7" fill="#a8a8ac"/>

  <!-- bin B -->
  <path d="M735 348 v54 h150 v-54" fill="#e6e6e8" stroke="#9a9aa0" stroke-width="1.3"/>
  <text x="739" y="340" font-size="11" fill="#5a5f66">CHUTE B</text>
  <text x="881" y="340" font-size="16" fill="#1f4e79" text-anchor="end" font-weight="700">9</text>
  <text x="743" y="384" font-size="8.5" fill="#7c818a">LEVEL</text>
  <rect x="743" y="388" width="134" height="9" fill="#e6e6e8" stroke="#a8a8ac" stroke-width="0.8"/>
  <rect x="744" y="389" width="74" height="7" fill="#a8a8ac"/>

  <!-- parcels on the belt (outlined; A/B label in data colour) -->
  <g>
    <rect x="206" y="214" width="30" height="26" fill="#f2f2f3" stroke="#a8a8ac" stroke-width="1.2"/>
    <line x1="206" y1="221" x2="236" y2="221" stroke="#a8a8ac" stroke-width="0.7" opacity="0.6"/>
    <text x="221" y="232" font-size="12" fill="#1f4e79" text-anchor="middle">A</text>
  </g>
  <g>
    <rect x="372" y="214" width="30" height="26" fill="#f2f2f3" stroke="#a8a8ac" stroke-width="1.2"/>
    <line x1="372" y1="221" x2="402" y2="221" stroke="#a8a8ac" stroke-width="0.7" opacity="0.6"/>
    <text x="387" y="232" font-size="12" fill="#1f4e79" text-anchor="middle">B</text>
  </g>
  <g>
    <rect x="492" y="214" width="30" height="26" fill="#f2f2f3" stroke="#a8a8ac" stroke-width="1.2"/>
    <line x1="492" y1="221" x2="522" y2="221" stroke="#a8a8ac" stroke-width="0.7" opacity="0.6"/>
    <text x="507" y="232" font-size="12" fill="#1f4e79" text-anchor="middle">A</text>
  </g>

  <!-- ===================== KPI rail ===================== -->
  <g>
    <rect x="912" y="58" width="252" height="92" rx="3" fill="#ededef" stroke="#cfcfd3"/>
    <text x="926" y="80" font-size="11" fill="#7c818a" letter-spacing="0.5">CELL STATUS</text>
    <text x="926" y="104" font-size="12" fill="#5a5f66">Conveyor M-001</text><text x="1150" y="104" font-size="12.5" fill="#33373b" text-anchor="end" font-weight="700">RUN</text>
    <text x="926" y="124" font-size="12" fill="#5a5f66">Diverter DV-001</text><text x="1150" y="124" font-size="12.5" fill="#33373b" text-anchor="end" font-weight="700">DIVERT → A</text>
    <text x="926" y="144" font-size="12" fill="#5a5f66">Work in progress</text><text x="1150" y="144" font-size="12.5" fill="#1f4e79" text-anchor="end" font-weight="700">3</text>
  </g>
  <g>
    <rect x="912" y="162" width="252" height="86" rx="3" fill="#ededef" stroke="#cfcfd3"/>
    <text x="926" y="184" font-size="11" fill="#7c818a" letter-spacing="0.5">THROUGHPUT</text>
    <text x="926" y="214" font-size="26" fill="#1f4e79" font-weight="700">24</text>
    <text x="982" y="214" font-size="12" fill="#5a5f66">parcels / min</text>
    <rect x="926" y="228" width="224" height="8" fill="#e6e6e8" stroke="#cfcfd3"/>
    <rect x="950" y="228" width="92" height="8" fill="#aed6f1"/>
    <rect x="1036" y="225" width="3" height="14" fill="#1f4e79"/>
  </g>
  <g>
    <rect x="912" y="260" width="252" height="86" rx="3" fill="#ededef" stroke="#cfcfd3"/>
    <text x="926" y="282" font-size="11" fill="#7c818a" letter-spacing="0.5">SORTED</text>
    <text x="926" y="308" font-size="12" fill="#5a5f66">Chute A</text><text x="1062" y="310" font-size="20" fill="#1f4e79" text-anchor="end" font-weight="700">12</text>
    <text x="926" y="334" font-size="12" fill="#5a5f66">Chute B</text><text x="1062" y="336" font-size="20" fill="#1f4e79" text-anchor="end" font-weight="700">9</text>
    <rect x="1086" y="292" width="64" height="46" fill="#e6e6e8" stroke="#cfcfd3"/>
    <polyline points="1090,330 1102,326 1114,318 1126,316 1138,306 1148,300" fill="none" stroke="#1f4e79" stroke-width="1.6"/>
  </g>

  <!-- ===================== trend + alarm summary ===================== -->
  <rect x="16" y="430" width="868" height="112" rx="3" fill="#ededef" stroke="#cfcfd3"/>
  <text x="30" y="452" font-size="11.5" fill="#5a5f66">Sorted parcels — trend</text>
  <rect x="700" y="442" width="11" height="9" fill="#1f4e79"/><text x="716" y="451" font-size="10.5" fill="#7c818a">Chute A</text>
  <rect x="788" y="442" width="11" height="9" fill="#5a5f66"/><text x="804" y="451" font-size="10.5" fill="#7c818a">Chute B</text>
  <line x1="30" y1="528" x2="868" y2="528" stroke="#d6d6da" stroke-width="1"/>
  <line x1="30" y1="498" x2="868" y2="498" stroke="#d6d6da" stroke-width="1"/>
  <line x1="30" y1="468" x2="868" y2="468" stroke="#d6d6da" stroke-width="1"/>
  <polyline points="30,524 140,520 250,510 360,500 470,488 580,476 690,462 820,452" fill="none" stroke="#1f4e79" stroke-width="1.8"/>
  <polyline points="30,526 140,524 250,518 360,512 470,504 580,496 690,486 820,478" fill="none" stroke="#5a5f66" stroke-width="1.8"/>

  <!-- alarm summary (clean state — colour reserved for alarms; none active) -->
  <rect x="900" y="430" width="264" height="112" rx="3" fill="#ededef" stroke="#cfcfd3"/>
  <text x="914" y="452" font-size="11.5" fill="#5a5f66">Alarm summary</text>
  <line x1="914" y1="462" x2="1150" y2="462" stroke="#d6d6da"/>
  <text x="914" y="486" font-size="11" fill="#7c818a">PRIORITY</text>
  <text x="1000" y="486" font-size="11" fill="#7c818a">TAG</text>
  <text x="1080" y="486" font-size="11" fill="#7c818a">STATE</text>
  <text x="914" y="512" font-size="12" fill="#8b9098">— </text>
  <text x="940" y="512" font-size="12" fill="#7c818a">No active alarms</text>
</svg>
