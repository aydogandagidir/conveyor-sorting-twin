name: pages

# Build the demo report and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate the demo report, landing page, and live HMI (stdlib only)
        run: |
          python scripts/run_full_demo.py --export-dir=_site
          cp web/index.html _site/index.html        # landing links to demo_report.html + /hmi/
          python scripts/export_trace.py             # writes web/hmi/traces/*.json
          mkdir -p _site/hmi
          cp -r web/hmi/* _site/hmi/                 # the live web HMI (replays the traces)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
